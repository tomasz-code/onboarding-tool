<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kunden-Onboarding</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --accent: #1A1A2E;
      --accent2: #C9A96E;
      --text: #1A1A2E;
      --text-muted: #8A8A9A;
      --border: #E8E4DF;
      --user-bg: #1A1A2E;
      --user-text: #FFFFFF;
      --agent-bg: #FFFFFF;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 28px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent2);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 82%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.agent { align-self: flex-start; }
    .message.user  { align-self: flex-end; }

    .message-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .message.user .message-label { text-align: right; }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .message.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--accent2);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      width: 100%;
      max-width: 760px;
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent2);
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      resize: none;
      min-height: 24px;
      max-height: 140px;
      line-height: 1.5;
    }

    textarea::placeholder { color: var(--text-muted); }

    button#send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    button#send-btn:hover { background: var(--accent2); }
    button#send-btn:active { transform: scale(0.95); }
    button#send-btn:disabled { opacity: 0.4; cursor: default; }

    button#send-btn svg { width: 18px; height: 18px; }

    #finish-bar {
      display: none;
      width: 100%;
      max-width: 760px;
      padding: 0 24px 24px;
    }

    #finish-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent2);
      color: var(--accent);
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.1s;
    }

    #finish-btn:hover { opacity: 0.88; }
    #finish-btn:active { transform: scale(0.99); }
    #finish-btn:disabled { opacity: 0.5; cursor: default; }

    #status-msg {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px 0 0;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Kunden-Onboarding</h1>
  <span>Zielgruppen-Analyse</span>
</header>

<div id="chat-window"></div>

<div id="finish-bar">
  <button id="finish-btn">✦ Worksheet erstellen & speichern</button>
  <p id="status-msg"></p>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Deine Antwort…" rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="hint">Drücke Enter zum Senden · Shift+Enter für neue Zeile</p>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const BACKEND_URL = 'https://onboarding-tool-production.up.railway.app'; // <-- hier deine Railway URL eintragen
  // ──────────────────────────────────────────────────────────

  const SYSTEM_PROMPT = `Du bist ein strategischer Onboarding-Spezialist einer Direct-Response-Marketing-Agentur. Deine Aufgabe ist es, durch gezielte Befragung ein tiefes Verständnis für das Produkt des Kunden und seine Zielgruppe zu entwickeln — präzise genug, um sofort effektive Werbebotschaften zu entwickeln.

Dein Job ist NICHT, generische Marketingfragen zu stellen. Dein Job ist es, den Kunden durch einen strukturierten Gesprächsprozess zu führen, der die spezifischen Mechanismen hinter seinem Angebot und die echten Beweggründe seiner Zielgruppe ans Licht bringt.

Du rätst nicht, erfindest nichts und machst keine Annahmen. Alles, was du zurückspiegelst, muss direkt aus dem kommen, was der Kunde dir sagt. Wenn etwas unklar ist, fragst du nach.

PHASEN:
PHASE 1 — Frage: "Beschreibe mir dein Produkt oder deinen Service — so wie du es einem potenziellen Kunden in einem persönlichen Gespräch erklären würdest."
PHASE 2 — Frage nach der konkreten Transformation: Was hat der Kunde danach, das er vorher nicht hatte?
PHASE 3 — Besten Kunden beschreiben lassen (psychografisch, nicht nur demografisch). Sondierungsfragen: Was dachte/fühlte er vorher? Was ließ ihn Ja sagen? Was hätte ihn beinahe abgehalten? Was sagte er danach über sich?
PHASE 4 — Kaufbarrieren: Was sagen Interessenten wenn sie NICHT kaufen? Und was schützt sie wirklich davor?
PHASE 5 — Entanglement-Map als Tabelle: Was schützt die Zielgruppe | Wovon hält es sie ab
PHASE 6 — Vielleicht-Check: Wenn der Kunde "vielleicht", "oder", "ich bin nicht sicher" sagt — direkt ansprechen und auf Klarheit drängen.
PHASE 7 — Positionierung: Zwei Optionen präsentieren (Barriere direkt adressieren ODER Schutzmechanismus adressieren)
PHASE 8 — Kampagnen-Kriterien: Was verlangt der Kunde konkret von den Botschaften?

Wichtige Regeln:
- Eine Frage auf einmal. Niemals mehrere Fragen stapeln.
- Benutze die exakten Worte des Kunden beim Zurückspiegeln.
- Kein Cheerleading. Chirurgische Befragung.
- Wenn du das Gefühl hast, dass alle wesentlichen Informationen gesammelt wurden, schreibe am Ende deiner letzten Nachricht exakt diesen Satz auf einer neuen Zeile: "ONBOARDING_COMPLETE"

Beginne jetzt mit Phase 1.`;

  let messages = [];
  let onboardingDone = false;

  const chatWindow = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const finishBar  = document.getElementById('finish-bar');
  const finishBtn  = document.getElementById('finish-btn');
  const statusMsg  = document.getElementById('status-msg');

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = userInput.scrollHeight + 'px';
  });

  // Enter to send
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  function addMessage(role, text) {
    const cleanText = text.replace('ONBOARDING_COMPLETE', '').trim();
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'agent' ? 'Berater' : 'Du';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = cleanText;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';
    wrapper.id = 'typing';
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';
    wrapper.appendChild(indicator);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function handleSend() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });

      const data = await res.json();
      removeTyping();

      const reply = data.content?.[0]?.text || 'Fehler beim Laden der Antwort.';
      messages.push({ role: 'assistant', content: reply });
      addMessage('agent', reply);

      if (reply.includes('ONBOARDING_COMPLETE')) {
        onboardingDone = true;
        finishBar.style.display = 'block';
        document.getElementById('input-area').style.display = 'none';
      }
    } catch (err) {
      removeTyping();
      addMessage('agent', 'Verbindungsfehler. Bitte Seite neu laden.');
    }

    sendBtn.disabled = false;
  }

  finishBtn.addEventListener('click', async () => {
    finishBtn.disabled = true;
    statusMsg.textContent = 'Worksheet wird erstellt…';

    try {
      const res = await fetch(`${BACKEND_URL}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });

      const data = await res.json();
      if (data.success) {
        statusMsg.textContent = '✓ Worksheet wurde in Google Drive gespeichert.';
        finishBtn.textContent = '✓ Fertig';
      } else {
        statusMsg.textContent = 'Fehler: ' + (data.error || 'Unbekannter Fehler');
        finishBtn.disabled = false;
      }
    } catch (err) {
      statusMsg.textContent = 'Verbindungsfehler beim Speichern.';
      finishBtn.disabled = false;
    }
  });

  // Start conversation automatically
  (async () => {
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [], system: SYSTEM_PROMPT })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.content?.[0]?.text || 'Hallo! Beschreibe mir dein Produkt.';
      messages.push({ role: 'assistant', content: reply });
      addMessage('agent', reply);
    } catch {
      removeTyping();
      addMessage('agent', 'Verbindungsfehler. Bitte Seite neu laden.');
    }
    sendBtn.disabled = false;
    userInput.focus();
  })();
</script>
</body>
</html>
